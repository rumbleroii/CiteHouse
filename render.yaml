# Render Blueprint — backend API (free web service)
# Dashboard: New → Blueprint → connect this repo
services:
  - type: web
    name: citehouse-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: COMPANIES_HOUSE_BASE_URL
        value: https://api.company-information.service.gov.uk
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: OPENAI_INTELLIGENCE_MODEL
        value: gpt-5.6-terra
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_BASE_URL
        value: https://api.tavily.com
